<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"><head><title>Test</title>
<link rel="stylesheet" href="style.css">
</style>

<style>
form{padding:5px;position:fixed;
left:50px;bottom:2px;background:;}
button{font-size:120%;display:block;padding:5px;position:fixed;
left:0;bottom:0;background:;}
#content,
style{
box-sizing:border-box;
width:100%;
position:relative;
left:0;bottom:0;
display:inline-block;
background: rgba(255, 255, 255,1);
font-family: monospace;
white-space:pre-wrap;
padding:1em;
margin:0;
}
</style>
<script src="jquery.js"></script>
</head><body>

<div id="content" contenteditable="true"></div>
<form action=".">
  <label for="url">Url</label>
  <input type="text" id="url" name="url">
  <input type="submit" value="Submit">
</form>


<script>
var $_GET = {};
if(document.location.toString().indexOf('?') !== -1){
var query = document.location.toString().replace(/^.*?\?/, '').replace(/#.*$/,'').split('&');
for(var i=0, l=query.length;i<l;
i++){var aux = decodeURIComponent(query[i]).split('='); 
$_GET[aux[0]] = aux[1];}}
var it = $_GET['url'];
$.get(it,function(data){
$("#content").text(data);
});
</script>
</body>

<script>
$("html").append("<button><p style='display:none'>□</p><p>■</p></button>").html;

$("button p,form").toggle();
});
</script>
