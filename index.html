<style>
button{font-size:120%;display:block;padding:5px;position:fixed;
left:0;bottom:0;background:;}

style{

<div id="banner"><div id="anim"></div></div>
<pl></pl>
<div id="content" contenteditable="true"></div>

<script>
var $_GET = {};
if(document.location.toString().indexOf('?') !== -1){
var query = document.location.toString().replace(/^.*?\?/, '').replace(/#.*$/,'').split('&');
for(var i=0, l=query.length;i<l;
i++){var aux = decodeURIComponent(query[i]).split('='); 
$_GET[aux[0]] = aux[1];}}
var it = $_GET['url'];
var a = document.getElementById("anim");
var startTime = Date.now();
var callbacks = 0;
function callback(){callbacks++;
if(true)
window.requestAnimationFrame(callback,a);
time = Date.now();
a.style.left= ((time - startTime)/50 % 340) + "px";
if (!true)window.requestAnimationFrame(callback, a);
}
window.onload = function(){
window.requestAnimationFrame(callback, a);
};
$.get(it,function(data){
$("#content").text(data);
});
$("#anim").css("content:",it);
</script>
</body>
<style contenteditable="true">
